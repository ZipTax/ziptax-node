      - name: "line1"
        type: "string"
        required: true
        description: "First line of address"
      - name: "line2"
        type: "string"
        required: false
        description: "Second line of address"
      - name: "city"
        type: "string"
        required: true
        description: "City or post-town"
      - name: "state"
        type: "string"
        required: true
        description: "State abbreviation"
      - name: "zip"
        type: "string"
        required: true
        description: "Postal or ZIP code"
      - name: "countryCode"
        type: "string"
        required: true
        default: "US"
        description: "ISO 3166-1 alpha-2 country code"

  - name: "CartItemWithTax"
    description: "Cart line item with tax calculation for order creation"
    api: "taxcloud"
    properties:
      - name: "index"
        type: "integer"
        format: "int64"
        required: true
        description: "Position/index of item within the cart"
        example: 0
      - name: "itemId"
        type: "string"
        required: true
        description: "Unique identifier for the cart item"
        example: "item-1"
      - name: "price"
        type: "number"
        format: "float"
        required: true
        description: "Unit price of the item"
        example: 10.8
      - name: "quantity"
        type: "number"
        format: "float"
        required: true
        description: "Quantity of the item"
        example: 1.5
      - name: "tax"
        type: "Tax"
        required: true
        description: "Tax information for the item"
      - name: "productId"
        type: "string"
        required: false
        description: "Product ID from product catalog (must match existing product)"
      - name: "tic"
        type: "integer"
        format: "int64"
        required: false
        description: "Taxability Information Code (defaults to 0 if not provided)"
        default: 0

  - name: "CartItemWithTaxResponse"
    description: "Cart line item response from TaxCloud"
    api: "taxcloud"
    properties:
      - name: "index"
        type: "integer"
        format: "int64"
        required: true
        description: "Position/index of item within the cart"
      - name: "itemId"
        type: "string"
        required: true
        description: "Unique identifier for the cart item"
      - name: "price"
        type: "number"
        format: "float"
        required: true
        description: "Unit price of the item"
      - name: "quantity"
        type: "number"
        format: "float"
        required: true
        description: "Quantity of the item"
      - name: "tax"
        type: "Tax"
        required: true
        description: "Tax information for the item"
      - name: "tic"
        type: "integer"
        format: "int64"
        required: true
        description: "Taxability Information Code"

  - name: "Tax"
    description: "Tax calculation details for a cart item"
    api: "taxcloud"
    properties:
      - name: "amount"
        type: "number"
        format: "float"
        required: true
        description: "Tax amount calculated for the item"
        example: 1.31
      - name: "rate"
        type: "number"
        format: "float"
        required: true
        description: "Tax rate applied (decimal format)"
        example: 0.0813

  - name: "Currency"
    description: "Currency information for order"
    api: "taxcloud"
    properties:
      - name: "currencyCode"
        type: "string"
        required: false
        description: "ISO currency code"
        default: "USD"
        enum: ["USD", "CAD"]

  - name: "CurrencyResponse"
    description: "Currency response from TaxCloud"
    api: "taxcloud"
    properties:
      - name: "currencyCode"
        type: "string"
        required: true
        description: "ISO currency code"

  - name: "Exemption"
    description: "Tax exemption certificate information"
    api: "taxcloud"
    properties:
      - name: "exemptionId"
        type: "string"
        required: false
        description: "ID of exemption certificate used for customer (if provided, isExempt assumed true)"
      - name: "isExempt"
        type: "boolean"
        required: false
        description: "Whether customer is exempt from tax"

  - name: "UpdateOrderRequest"
    description: "Request payload for updating an order in TaxCloud (currently only completedDate can be updated)"
    api: "taxcloud"
    properties:
      - name: "completedDate"
        type: "string"
        format: "date-time"
        required: true
        description: "RFC3339 datetime string when order was shipped/completed (creates tax liability)"
        example: "2024-01-16T10:00:00Z"

  # ---------------------------------------------------------------------------
  # TaxCloud API Models - Cart-to-Order
  # ---------------------------------------------------------------------------
  - name: "CreateOrderFromCartRequest"
    description: |
      Request payload for creating an order from a previously calculated cart
      in TaxCloud. The user must have previously called calculateCart with
      TaxCloud credentials and stored the returned cartId from the
      TaxCloudCartItemResponse. The orderId represents the user's internal
      order identifier for cross-referencing. To set a completed date on
      the order, use updateOrder after creation.
    api: "taxcloud"
    properties:
      - name: "cartId"
        type: "string"
        required: true
        description: "Cart ID from a previous TaxCloud calculateCart response (TaxCloudCartItemResponse.cartId). Identifies the cart to convert into an order."
        example: "ce4a1234-5678-90ab-cdef-1234567890ab"
        validation:
          min_length: 1
      - name: "orderId"
        type: "string"
        required: true
        description: "User's internal order ID for cross-referencing. Must be unique per connection to ensure accurate tax reporting and prevent duplicate transactions."
        example: "my-order-1"
        validation:
          min_length: 1

  # ---------------------------------------------------------------------------
  # TaxCloud API Models - Refunds
  # ---------------------------------------------------------------------------
  - name: "RefundTransactionRequest"
    description: "Request payload for creating a refund against an order in TaxCloud"
    api: "taxcloud"
    properties:
      - name: "items"
        type: "array"
        items_type: "CartItemRefundWithTaxRequest"
        required: false
        description: "Items to refund. If empty list or omitted, entire order will be refunded"
      - name: "returnedDate"
        type: "string"
        format: "date-time"
        required: false
        description: "Include only if this return is a change to a previously filed sales tax return (triggers Amended Sales Tax Return - not typically recommended)"

  - name: "CartItemRefundWithTaxRequest"
    description: "Cart line item to be refunded"
    api: "taxcloud"
    properties:
      - name: "itemId"
        type: "string"
        required: true
        description: "Unique identifier for the cart item to refund"
        example: "item-1"
      - name: "quantity"
        type: "number"
        format: "float"
        required: true
        description: "Quantity of the item to refund"
        example: 1.0

  - name: "RefundTransactionResponse"
    description: "Response after successfully creating a refund in TaxCloud"
    api: "taxcloud"
    properties:
      - name: "connectionId"
        type: "string"
        required: true
        description: "TaxCloud connection ID used for this refund"
      - name: "createdDate"
        type: "string"
        format: "date-time"
        required: true
        description: "RFC3339 datetime string when the refund was created"
      - name: "items"
        type: "array"
        items_type: "CartItemRefundWithTaxResponse"
        required: true
        description: "Array of refunded line items with tax calculations"
      - name: "returnedDate"
        type: "string"
        format: "date-time"
        required: false
        description: "RFC3339 datetime string when the refund took effect"

  - name: "CartItemRefundWithTaxResponse"
    description: "Refunded cart line item response from TaxCloud"
    api: "taxcloud"
    properties:
      - name: "index"
        type: "integer"
        format: "int64"
        required: true
        description: "Position/index of item within the cart"
      - name: "itemId"
        type: "string"
        required: true
        description: "Unique identifier for the cart item"
      - name: "price"
        type: "number"
        format: "float"
        required: true
        description: "Price of the refunded item"
      - name: "quantity"
        type: "number"
        format: "float"
        required: true
        description: "Quantity of the item refunded"
      - name: "tax"
        type: "RefundTax"
        required: true
        description: "Tax information for the refunded item"
      - name: "tic"
        type: "integer"
        format: "int64"
        required: false
        default: 0
        description: "Taxability Information Code"

  - name: "RefundTax"
    description: "Tax details for a refunded item"
    api: "taxcloud"
    properties:
      - name: "amount"
        type: "number"
        format: "float"
        required: true
        description: "Tax amount refunded for the item"
        example: 1.31


# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------
dependencies:
  # Runtime dependencies
  runtime:
    - name: "axios"           # HTTP client library
      version: "^1.6.0"
      purpose: "HTTP requests"
    - name: "zod"             # Runtime type validation (optional)
      version: "^3.22.0"
      purpose: "Runtime data validation"
      optional: true

  # Development dependencies
  development:
    - name: "@types/node"
      version: "^20.0.0"
      purpose: "Node.js type definitions"
    - name: "typescript"
      version: "^5.0.0"
      purpose: "TypeScript compiler"
    - name: "jest"
      version: "^29.0.0"
      purpose: "Testing framework"
    - name: "@types/jest"
      version: "^29.0.0"
      purpose: "Jest type definitions"
    - name: "ts-jest"
      version: "^29.0.0"
      purpose: "TypeScript support for Jest"
    - name: "eslint"
      version: "^8.0.0"
      purpose: "Linting"
    - name: "@typescript-eslint/parser"
      version: "^6.0.0"
      purpose: "TypeScript parser for ESLint"
    - name: "@typescript-eslint/eslint-plugin"
      version: "^6.0.0"
      purpose: "TypeScript linting rules"
    - name: "prettier"
      version: "^3.0.0"
      purpose: "Code formatting"
    - name: "tsx"
      version: "^4.0.0"
      purpose: "TypeScript execution for examples"

# -----------------------------------------------------------------------------
# Project Structure
# -----------------------------------------------------------------------------
# Define the directory structure for the SDK
structure:
  root_files:
    - "README.md"
    - "LICENSE"
    - "package.json"
    - ".gitignore"
    - "tsconfig.json"
    - ".npmignore"

  directories:
    - path: "src"
      contents:
        - "index.ts"
        - "client.ts"
        - "config.ts"
        - "exceptions.ts"

    - path: "src/resources"
      contents:
        - "index.ts"
        - "functions.ts"

    - path: "src/models"
      contents:
        - "index.ts"
        - "responses.ts"

    - path: "src/utils"
      contents:
        - "index.ts"
        - "http.ts"
        - "retry.ts"
        - "validation.ts"

    - path: "tests"
      contents:
        - "client.test.ts"
        - "functions.test.ts"
        - "http.test.ts"      # REQUIRED: Tests for HTTPClient utility
        - "retry.test.ts"     # REQUIRED: Tests for retry logic
        - "setup.ts"

    - path: "examples"
      contents:
        - "basic-usage.ts"
        - "async-usage.ts"
        - "error-handling.ts"

    - path: "docs"
      contents:
        - "index.md"
        - "quickstart.md"
        - "api-reference.md"

# -----------------------------------------------------------------------------
# Code Generation Settings
# -----------------------------------------------------------------------------
code_generation:
  # Style guide compliance
  style:
    follow_language_conventions: true
    style_guide: "Airbnb/Standard"
    line_length: 100
    indent_size: 2
    indent_style: "spaces"
    semicolons: true
    quotes: "single"

  # Documentation
  documentation:
    style: "jsdoc"
    include_examples: true
    include_type_info: true
    minimum_coverage: "public_api"

  # Testing
  testing:
    framework: "jest"
    include_unit_tests: true
    include_integration_tests: true
    mock_api_responses: true
    target_coverage: 80

  # Code quality
  quality:
    include_linter_config: true
    include_formatter_config: true
    include_type_checker_config: true
    include_pre_commit_hooks: false

# -----------------------------------------------------------------------------
# Build & Distribution
# -----------------------------------------------------------------------------
build:
  # Build system
  system: "typescript"

  # Build configuration
  output_directory: "dist"
  output_formats:
    - "cjs"      # CommonJS
    - "esm"      # ES Modules

  # Distribution
  distribution:
    platforms:
      - "npm"

    # Package metadata
    keywords:
      - "tax"
      - "ziptax"
      - "api"
      - "sdk"
      - "sales tax"
      - "node"
      - "typescript"

# -----------------------------------------------------------------------------
# Documentation
# -----------------------------------------------------------------------------
documentation:
  # Documentation tools
  generator: "typedoc"
  output: "docs/api"

  # Content requirements
  sections:
    - name: "Installation"
      required: true
    - name: "Quick Start"
      required: true
    - name: "Authentication"
      required: true
    - name: "API Reference"
      required: true
      auto_generate: true
    - name: "Error Handling"
      required: true
    - name: "Examples"
      required: true
    - name: "Contributing"
      required: false
    - name: "Changelog"
      required: true

  # API documentation
  api_docs:
    include_request_examples: true
    include_response_examples: true
    include_error_examples: true
    format: "markdown"

# -----------------------------------------------------------------------------
# Examples
# -----------------------------------------------------------------------------
examples:
  - name: "Basic Usage"
    file: "examples/basic-usage.ts"
    description: "Simple example showing basic SDK initialization and usage"
    required: true

  - name: "Async Operations"
    file: "examples/async-usage.ts"
    description: "Example using async/await for concurrent operations"
    required: false

  - name: "Error Handling"
    file: "examples/error-handling.ts"
    description: "Demonstrates proper error handling patterns"
    required: true

# -----------------------------------------------------------------------------
# CI/CD Configuration
# -----------------------------------------------------------------------------
ci_cd:
  # Continuous Integration
  platform: "github_actions"

  workflows:
    - name: "Test"
      triggers: ["push", "pull_request"]
      jobs:
        - "lint"
        - "type-check"
        - "test"
        - "coverage"

    - name: "Publish"
      triggers: ["release"]
      jobs:
        - "build"
        - "publish"

  # Testing matrix
  test_matrix:
    node_versions: ["18.x", "20.x", "22.x"]
    os: ["ubuntu-latest", "macos-latest", "windows-latest"]

# -----------------------------------------------------------------------------
# Additional Instructions
# -----------------------------------------------------------------------------
# Any special instructions or considerations for this SDK
instructions:
  special_considerations:
    - "Ensure all monetary values use appropriate number types"
    - "ZIP codes should be validated for format"
    - "Date handling should respect timezone requirements"
    - "All API responses should be properly typed with TypeScript interfaces"
    - "Use camelCase for all field names to match API conventions"

  # Code patterns to follow
  patterns:
    - pattern: "Config-based client initialization (ZipTax only)"
      example: |
        // Create a new client with ZipTax API key only (tax rate lookups)
        const client = new ZiptaxClient({ apiKey: 'xxx' });
        const result = await client.getSalesTaxByAddress({
          address: '200 Spectrum Center Drive, Irvine, CA 92618'
        });

    - pattern: "Client initialization with TaxCloud credentials"
      example: |
        // Create client with TaxCloud credentials for order management
        const client = new ZiptaxClient({
          apiKey: 'ziptax-api-key',
          taxCloudConnectionId: '25eb9b97-5acb-492d-b720-c03e79cf715a',
          taxCloudAPIKey: 'taxcloud-api-key'
        });

        // Now you can use both APIs
        const taxRates = await client.getSalesTaxByAddress({ address: '...' });
        const order = await client.createOrder({ orderId: 'my-order-1', ... });

    - pattern: "Cart tax calculation (ZipTax - default)"
      example: |
        // Calculate cart tax via ZipTax API (no TaxCloud credentials needed)
        const result = await client.calculateCart({
          items: [
            {
              customerId: 'customer-453',
              currency: { currencyCode: 'USD' },
              destination: {
                address: '200 Spectrum Center Dr, Irvine, CA 92618-1905'
              },
              origin: {
                address: '323 Washington Ave N, Minneapolis, MN 55401-2427'
              },
              lineItems: [
                {
                  itemId: 'item-1',
                  price: 10.75,
                  quantity: 1.5,
                  taxabilityCode: 0
                }
              ]
            }
          ]
        });
        // result is CalculateCartResponse

    - pattern: "Cart tax calculation (TaxCloud - automatic routing)"
      example: |
        // When client has TaxCloud credentials, calculateCart automatically
        // routes to TaxCloud API. Same input, different response type.
        const client = new ZiptaxClient({
          apiKey: 'ziptax-api-key',
          taxCloudConnectionId: '25eb9b97-...',
          taxCloudAPIKey: 'taxcloud-api-key'
        });

        const result = await client.calculateCart({
          items: [
            {
              customerId: 'customer-453',
              currency: { currencyCode: 'USD' },
              destination: {
                address: '200 Spectrum Center Dr, Irvine, CA 92618-1905'
              },
              origin: {
                address: '323 Washington Ave N, Minneapolis, MN 55401-2427'
              },
              lineItems: [
                {
                  itemId: 'item-1',
                  price: 10.75,
                  quantity: 1.5,
                  taxabilityCode: 0
                }
              ]
            }
          ]
        });
        // result is TaxCloudCalculateCartResponse (with connectionId,
        // transactionDate, structured addresses, and tic on line items)

    - pattern: "TaxCloud order creation"
      example: |
        const orderResponse = await client.createOrder({
          orderId: 'my-order-1',
          customerId: 'customer-453',
          transactionDate: '2024-01-15T09:30:00Z',
          completedDate: '2024-01-15T09:30:00Z',
          origin: {
            line1: '323 Washington Ave N',
            city: 'Minneapolis',
            state: 'MN',
            zip: '55401-2427'
          },
          destination: {
            line1: '323 Washington Ave N',
            city: 'Minneapolis',
            state: 'MN',
            zip: '55401-2427'
          },
          lineItems: [
            {
              index: 0,
              itemId: 'item-1',
              price: 10.8,
              quantity: 1.5,
              tax: { amount: 1.31, rate: 0.0813 },
              tic: 0
            }
          ],
          currency: { currencyCode: 'USD' }
        });

    - pattern: "Resource-based method organization"
      example: "await client.getSalesTaxByAddress({ address })"

    - pattern: "Consistent error handling"
      example: |
        try {
          const order = await client.createOrder({...});
        } catch (error) {
          if (error instanceof TaxCloudNotConfiguredError) {
            console.error('TaxCloud credentials not provided');
          } else {
            throw error;
          }
        }

  # Avoid these patterns
  anti_patterns:
    - "Don't use global state for configuration"
    - "Avoid bare catch clauses without error handling"
    - "Don't use 'any' type - leverage TypeScript's type system"
    - "Don't call TaxCloud methods without configuring TaxCloud credentials"

