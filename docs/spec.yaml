# -----------------------------------------------------------------------------
# CI/CD Quality Requirements
# -----------------------------------------------------------------------------
# These are MANDATORY - all checks must pass for the SDK to be release-ready
quality_requirements:
  code_coverage:
    minimum: 80
    tool: "jest"
    command: "jest --coverage --coverageThreshold='{\"global\":{\"lines\":80}}'"
    critical_modules:
      - "src/utils/http.ts"
      - "src/utils/retry.ts"
      - "src/exceptions.ts"

  type_checking:
    tool: "typescript"
    version: "^5.0.0"
    strict: true
    command: "tsc --noEmit"
    config:
      strict: true
      noImplicitAny: true
      strictNullChecks: true
      strictFunctionTypes: true
      noUnusedLocals: true
      noUnusedParameters: true
    notes:
      - "Enable strict mode in tsconfig.json"
      - "All functions must have explicit return types"
      - "No use of 'any' type without explicit justification"

  code_formatting:
    tool: "prettier"
    version: "^3.0.0"
    line_length: 100
    command: "prettier --check 'src/**/*.ts' 'tests/**/*.ts'"
    config:
      semi: true
      singleQuote: true
      trailingComma: "es5"
      printWidth: 100

  linting:
    tool: "eslint"
    version: "^8.0.0"
    command: "eslint 'src/**/*.ts' 'tests/**/*.ts'"
    config:
      extends:
        - "eslint:recommended"
        - "plugin:@typescript-eslint/recommended"
      rules:
        "@typescript-eslint/no-explicit-any": "error"
        "@typescript-eslint/explicit-function-return-type": "warn"
    notes:
      - "Disallow 'any' type usage"
      - "Require explicit return types on exported functions"

  typescript_requirements:
    version: "^5.0.0"
    strict_mode: true
    notes:
      - "Use interfaces for all API response types"
      - "Export all public types from index.ts"
      - "Maintain camelCase field names to match API"

# -----------------------------------------------------------------------------
# Version History
# -----------------------------------------------------------------------------
version_history:
  - version: "1.0.0"
    date: "2024-01-15"
    changes:
      - "Initial release"
      - "Support for TaxRates and Jurisdictions resources"
      - "Basic authentication and error handling"
